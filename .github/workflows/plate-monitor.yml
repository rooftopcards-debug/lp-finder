name: Plate Monitor

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/plate-monitor.yml"
      - "package.json"
      - "package-lock.json"
      - "src/**"
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      send_test_notification:
        description: "Send a test phone notification instead of checking plates"
        required: false
        default: false
        type: boolean
      send_current_available:
        description: "Send current available plates even if already known"
        required: false
        default: false
        type: boolean

concurrency:
  group: plate-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Send test notification
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_test_notification }}
        run: npm run notify:test
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

      - name: Check plates
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.send_test_notification }}
        run: |
          if [ "${{ inputs.send_current_available }}" = "true" ]; then
            npm run monitor:current
          else
            npm run monitor:hourly
          fi
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          NTFY_SERVER: ${{ secrets.NTFY_SERVER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

      - name: Save seen plate state
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.send_test_notification }}
        run: |
          if [ -z "$(git status --porcelain -- data/plate-monitor-state.json)" ]; then
            echo "No state changes to save."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/plate-monitor-state.json
          git commit -m "Update plate monitor state"
          git push
